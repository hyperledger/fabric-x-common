# ---------------------------------------------------------------------------
# "OrdererOrgs" - Definition of organizations managing orderer nodes
# ---------------------------------------------------------------------------
OrdererOrgs:
  # ---------------------------------------------------------------------------
  # Orderer
  # ---------------------------------------------------------------------------
  - &Node
    Name: ordering-org-1
    Domain: ordering-org-1.com
    EnableNodeOUs: true

    # ---------------------------------------------------------------------------
    # "CA"
    # ---------------------------------------------------------------------------
    # Uncomment this section to enable the explicit definition of the CA for this
    # organization.  This entry is a Spec.  See "Specs" section below for details.
    # ---------------------------------------------------------------------------
    # CA:
    #    Hostname: ca # implicitly ca.org1.example.com
    #    Country: US
    #    Province: California
    #    Locality: San Francisco
    #    OrganizationalUnit: Hyperledger Fabric
    #    StreetAddress: address for org # default nil
    #    PostalCode: postalCode for org # default nil
    #    PublicKeyAlgorithm: ecdsa # CA's key algorithm ("ecdsa" or "ed25519")
    CA:
      Hostname: my-ca.com
      CommonName: my-ca
      PublicKeyAlgorithm: ecdsa

    # ---------------------------------------------------------------------------
    # "Template"
    # ---------------------------------------------------------------------------
    # Allows for the definition of 1 or more hosts that are created sequentially
    # from a template. By default, this looks like "peer%d" from 0 to Count-1.
    # You may override the number of nodes (Count), the starting index (Start)
    # or the template used to construct the name (Hostname).
    #
    # PublicKeyAlgorithm: Hosts' key algorithm ("ecdsa" or "ed25519")
    #
    # Note: Template and Specs are not mutually exclusive.  You may define both
    # sections and the aggregate nodes will be created for you.  Take care with
    # name collisions
    # ---------------------------------------------------------------------------
    Template:
      Count: 1
      Start: 2
      Hostname: "{{.Prefix}}{{.Index}}" # default
      SANS:
        - "{{.Hostname}}.alt.{{.Domain}}"
      PublicKeyAlgorithm: ecdsa

    # ---------------------------------------------------------------------------
    # "Specs"
    # ---------------------------------------------------------------------------
    # Uncomment this section to enable the explicit definition of hosts in your
    # configuration.  Most users will want to use Template, below
    #
    # Specs is an array of Spec entries.  Each Spec entry consists of two fields:
    #   - Hostname:   (Required) The desired hostname, sans the domain.
    #   - CommonName: (Optional) Specifies the template or explicit override for
    #                 the CN.  By default, this is the template:
    #
    #                              "{{.Hostname}}.{{.Domain}}"
    #
    #                 which obtains its values from the Spec.Hostname and
    #                 Org.Domain, respectively.
    #   - SANS:       (Optional) Specifies one or more Subject Alternative Names
    #                 to be set in the resulting x509. Accepts template
    #                 variables {{.Hostname}}, {{.Domain}}, {{.CommonName}}. IP
    #                 addresses provided here will be properly recognized. Other
    #                 values will be taken as DNS names.
    #                 NOTE: Two implicit entries are created for you:
    #                     - {{ .CommonName }}
    #                     - {{ .Hostname }}
    #   PublicKeyAlgorithm: Nodes' key algorithm ("ecdsa" or "ed25519")
    # ---------------------------------------------------------------------------
    # Specs:
    #   - Hostname: foo # implicitly "foo.org1.example.com"
    #     CommonName: foo27.org5.example.com # overrides Hostname-based FQDN set above
    #     SANS:
    #       - "bar.{{.Domain}}"
    #       - "altfoo.{{.Domain}}"
    #       - "{{.Hostname}}.org6.net"
    #       - 172.16.10.31
    #     PublicKeyAlgorithm: ecdsa
    #   - Hostname: bar
    #   - Hostname: baz
    Specs:
      - &Specs
        Hostname: orderer-1.com
        CommonName: orderer-1
        PublicKeyAlgorithm: ecdsa

# ---------------------------------------------------------------------------
# "PeerOrgs" - Definition of organizations managing peer nodes
# ---------------------------------------------------------------------------
PeerOrgs:
  # ---------------------------------------------------------------------------
  # peer-1
  # ---------------------------------------------------------------------------
  - <<: *Node
    Name: peer-org-1
    Domain: peer-org-1.com

    Specs:
      - <<: *Specs
        CommonName: peer-1
        Hostname: peer-1.com

    # ---------------------------------------------------------------------------
    # "Users"
    # ---------------------------------------------------------------------------
    # Count: The number of user accounts _in addition_ to Admin
    # PublicKeyAlgorithm: Users' key algorithm ("ecdsa" or "ed25519")
    # ---------------------------------------------------------------------------
    Users:
      Count: 1
      PublicKeyAlgorithm: ecdsa

  # ---------------------------------------------------------------------------
  # Org2: See "Org1" for full specification
  # ---------------------------------------------------------------------------
  - <<: *Node
    Name: peer-org-2
    Domain: peer-org-2.com
    Template:
      Count: 1
      PublicKeyAlgorithm: ecdsa
    Specs:
      - <<: *Specs
        CommonName: peer-2
        Hostname: peer-2.com
    Users:
      Count: 1
      PublicKeyAlgorithm: ecdsa
      Specs:
        - Name: testuser
